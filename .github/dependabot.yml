version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # Keep @types/vscode pinned to the minimum supported VS Code version
      # declared in package.json engines.vscode.
      - dependency-name: "@types/vscode"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
